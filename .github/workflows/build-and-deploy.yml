name: Build and Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test:cov

      - name: Build application
        env:
          MASJID_LATITUDE: ${{ vars.MASJID_LATITUDE }}
          MASJID_LONGITUDE: ${{ vars.MASJID_LONGITUDE }}
          MASJID_TIMEZONE: ${{ vars.MASJID_TIMEZONE }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  deploy-to-branch:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build application
        env:
          MASJID_LATITUDE: ${{ vars.MASJID_LATITUDE }}
          MASJID_LONGITUDE: ${{ vars.MASJID_LONGITUDE }}
          MASJID_TIMEZONE: ${{ vars.MASJID_TIMEZONE }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
        run: npm run build

      - name: Deploy to prod branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Save necessary files to temporary location
          cp -r dist /tmp/dist-build
          cp -r prisma /tmp/prisma-build
          cp package.json /tmp/package.json
          cp package-lock.json /tmp/package-lock.json
          cp .cpanel.yml /tmp/.cpanel.yml 2>/dev/null || echo "No .cpanel.yml found"
          
          # Fetch the prod branch if it exists
          git fetch origin prod:prod 2>/dev/null || git checkout -b prod
          
          # Switch to prod branch
          git checkout prod
          
          # Remove all existing files except .git
          find . -maxdepth 1 ! -name '.git' ! -name '.' ! -name '..' -exec rm -rf {} +
          
          # Copy build files from temporary location
          cp -r /tmp/dist-build ./dist
          cp -r /tmp/prisma-build ./prisma
          cp /tmp/package.json ./package.json
          cp /tmp/package-lock.json ./package-lock.json
          
          # Restore .cpanel.yml
          if [ -f /tmp/.cpanel.yml ]; then
            cp /tmp/.cpanel.yml .cpanel.yml
          fi
          
          # Clean up temporary files
          rm -rf /tmp/dist-build /tmp/prisma-build /tmp/package.json /tmp/package-lock.json /tmp/.cpanel.yml
          
          # Add all files to git
          git add -A
          
          # Commit the build (allow empty in case nothing changed)
          git commit -m "Build: ${{ github.sha }} from ${{ github.ref_name }}" || echo "No changes to commit"
          
          # Push to prod branch (no force, linear history)
          git push origin prod
