---
deployment:
  tasks:
    # Install production dependencies only (skip scripts to avoid node path issues)
    - /bin/bash -c "export PATH=/opt/cpanel/ea-nodejs22/bin:$PATH && cd /home2/theisbcc/iqama.theisbc.ca/api && npm install --omit=dev --ignore-scripts"
    # Generate Prisma Client for production
    - /bin/bash -c "export PATH=/opt/cpanel/ea-nodejs22/bin:$PATH && cd /home2/theisbcc/iqama.theisbc.ca/api && npx prisma generate"
    # Restart the Node.js app via Passenger
    - /bin/mkdir -p /home2/theisbcc/iqama.theisbc.ca/api/tmp
    - /bin/touch /home2/theisbcc/iqama.theisbc.ca/api/tmp/restart.txt
